<!DOCTYPE html>
<html>
<head>
    <title>Smart Code Analyzer</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 40px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-family: monospace;
            font-size: 14px;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            background: #38bdf8;
            color: black;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0ea5e9;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .result {
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
        }

        .green { background: #16a34a; }
        .yellow { background: #facc15; color: black; }
        .red { background: #dc2626; }

        .suggestion {
            margin-top: 10px;
            padding: 10px;
            background: #334155;
            border-left: 4px solid #38bdf8;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            background: #1e293b;
        }

        th, td {
            padding: 10px;
            border: 1px solid #334155;
        }

        th {
            background: #38bdf8;
            color: black;
        }

        .copy-btn {
            background: #22c55e;
            margin-left: 10px;
        }
    </style>
</head>

<body>

<h2>🚀 Smart Code Analyzer</h2>

<form method="POST">
    <textarea name="code" placeholder="Paste your code here..."></textarea><br>
    <button type="submit">Analyze</button>
</form>

{% if result %}
<div class="card">
    <div class="result 
        {% if 'O(1)' in result %}green
        {% elif 'O(n)' in result %}yellow
        {% else %}red
        {% endif %}
    ">
        Complexity: {{ result }}
        <button class="copy-btn" onclick="copyText('{{ result }}')">Copy</button>
    </div>

    <div class="suggestion">
        💡 {{ suggestion }}
    </div>
</div>
{% endif %}
